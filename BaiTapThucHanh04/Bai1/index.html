<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Bài 1.1 - Bảng điểm sinh viên</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Bài 1.1 – Bảng điểm sinh viên</h1>

    <div class="form-row">
      <div class="field">
        <label for="fullname">Họ tên</label>
        <input type="text" id="fullname" placeholder="Nhập họ tên sinh viên" />
      </div>
      <div class="field">
        <label for="score">Điểm (0 - 10)</label>
        <input type="number" id="score" min="0" max="10" step="0.1" placeholder="Nhập điểm" />
      </div>
      <button id="addBtn">Thêm</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>STT</th>
          <th>Họ tên</th>
          <th>Điểm</th>
          <th>Xếp loại</th>
          <th>Thao tác</th>
        </tr>
      </thead>
      <tbody id="studentBody">
        <!-- render bằng JS -->
      </tbody>
    </table>

    <div class="stats">
      <span id="totalCount">Tổng số sinh viên: 0</span>
      <span id="averageScore">Điểm trung bình: 0</span>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
