<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Bài 1.2 - Bộ lọc & tìm kiếm sinh viên</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Bài 1.2 – Bộ lọc & Tìm kiếm</h1>

    <div class="top-controls">
      <div class="field">
        <label for="searchInput">Tìm kiếm theo tên</label>
        <input type="text" id="searchInput" placeholder="Nhập tên sinh viên..." />
      </div>

      <div class="field">
        <label for="typeFilter">Lọc theo xếp loại</label>
        <select id="typeFilter">
          <option value="all">Tất cả</option>
          <option value="Giỏi">Giỏi</option>
          <option value="Khá">Khá</option>
          <option value="Trung bình">Trung bình</option>
          <option value="Yếu">Yếu</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="field">
        <label for="fullname">Họ tên</label>
        <input type="text" id="fullname" placeholder="Nhập họ tên sinh viên" />
      </div>
      <div class="field">
        <label for="score">Điểm (0 - 10)</label>
        <input type="number" id="score" min="0" max="10" step="0.1" placeholder="Nhập điểm" />
      </div>
      <button id="addBtn">Thêm</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>STT</th>
          <th>Họ tên</th>
          <th id="scoreHeader" class="sortable">
            Điểm
            <span id="scoreArrow">▲▼</span>
          </th>
          <th>Xếp loại</th>
          <th>Thao tác</th>
        </tr>
      </thead>
      <tbody id="studentBody">
        <!-- render bằng JS -->
      </tbody>
    </table>

    <div id="noResult" class="no-result" style="display:none;">
      Không có kết quả
    </div>

    <div class="stats">
      <span id="totalCount">Tổng số sinh viên (gốc): 0</span>
      <span id="averageScore">Điểm trung bình (gốc): 0</span>
      <span id="visibleCount">Số sinh viên đang hiển thị: 0</span>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
