<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Bài 2.1 - Form đăng ký tài khoản</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Form đăng ký tài khoản</h1>

    <form id="registerForm" novalidate>
      <div class="field">
        <label for="fullname">Họ và tên</label>
        <input type="text" id="fullname" />
        <span class="error" id="fullnameError"></span>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" />
        <span class="error" id="emailError"></span>
      </div>

      <div class="field">
        <label for="phone">Số điện thoại</label>
        <input type="tel" id="phone" />
        <span class="error" id="phoneError"></span>
      </div>

      <div class="field">
        <label for="password">Mật khẩu</label>
        <input type="password" id="password" />
        <span class="error" id="passwordError"></span>
      </div>

      <div class="field">
        <label for="confirmPassword">Xác nhận mật khẩu</label>
        <input type="password" id="confirmPassword" />
        <span class="error" id="confirmPasswordError"></span>
      </div>

      <div class="field">
        <label>Giới tính</label>
        <div class="inline-group">
          <label><input type="radio" name="gender" value="male" /> Nam</label>
          <label><input type="radio" name="gender" value="female" /> Nữ</label>
          <label><input type="radio" name="gender" value="other" /> Khác</label>
        </div>
        <span class="error" id="genderError"></span>
      </div>

      <div class="field checkbox-field">
        <label>
          <input type="checkbox" id="terms" />
          Tôi đồng ý với điều khoản sử dụng
        </label>
        <span class="error" id="termsError"></span>
      </div>

      <button type="submit">Đăng ký</button>
    </form>

    <div id="successPanel" class="success-panel" style="display:none;">
      <h2>Đăng ký thành công! 🎉</h2>
      <p>Xin chào, <span id="successName"></span>!</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
